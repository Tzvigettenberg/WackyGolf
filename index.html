<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#4CAF50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <title>Wacky Golf</title>
  <style>
    :root { color-scheme: light; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100dvh;
      overflow: hidden;
      background: #87CEEB;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
      overscroll-behavior: none;
    }
    canvas { display: block; touch-action: none; }
    #hud-top {
      position: fixed; top: env(safe-area-inset-top, 12px); left: 14px;
      pointer-events: none;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      display: flex; flex-direction: column; align-items: flex-start; gap: 5px;
    }
    #title {
      font-size: 16px; font-weight: 800; letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    #hud-stats {
      display: flex; gap: 5px; flex-wrap: wrap;
    }
    #hud-stats > div, #hud-stats > button {
      font-size: 13px; font-weight: 700;
      background: rgba(0,0,0,0.32);
      padding: 5px 10px; border-radius: 999px;
      line-height: 1;
    }
    #hud-stats > button {
      pointer-events: auto;
      border: none;
      color: white;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    #hud-stats > button:active { transform: scale(0.95); }
    #pause-btn { background: rgba(0,0,0,0.42); font-size: 16px; padding: 4px 10px; }

    /* Hide gameplay UI when the title screen is shown */
    body.title-active #hud-top,
    body.title-active #hud-bottom,
    body.title-active #club-selector,
    body.title-active #minimap,
    body.title-active #power-meter,
    body.title-active #shot-distance,
    body.title-active .rotate-btn { display: none !important; }

    /* Title screen */
    #title-screen {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column; align-items: center; justify-content: space-between;
      pointer-events: none;
      z-index: 80;
      padding: env(safe-area-inset-top, 24px) 16px env(safe-area-inset-bottom, 24px);
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.45) 0%,
        rgba(0, 0, 0, 0.15) 35%,
        rgba(0, 0, 0, 0.15) 65%,
        rgba(0, 0, 0, 0.55) 100%
      );
      color: white;
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.55);
      font-family: inherit;
    }
    #title-screen.shown { display: flex; }
    #title-screen .top {
      pointer-events: none;
      text-align: center; padding-top: 28px;
    }
    #title-screen .logo {
      font-size: 44px; font-weight: 900; letter-spacing: 3px; line-height: 1;
      text-transform: uppercase;
    }
    #title-subtitle {
      margin-top: 10px;
      font-size: 13px; letter-spacing: 1.5px; opacity: 0.8; text-transform: uppercase;
    }
    #title-screen .center {
      display: flex; flex-direction: column; gap: 12px; align-items: center;
      pointer-events: auto;
      /* center vertically within the screen — pushes itself to the middle of
         the remaining space below the top section */
      margin: auto 0;
    }
    #title-screen .center button {
      pointer-events: auto;
      min-width: 220px;
      padding: 14px 22px;
      font-size: 17px; font-weight: 800; letter-spacing: 1.5px;
      border: none; border-radius: 14px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
      transition: transform 0.08s ease;
    }
    #title-screen .center button:active { transform: scale(0.97); }
    #title-play   { background: white; color: #111; }
    #title-resume { background: #4caf50; color: white; }
    /* Cash-Out screen — between hole completion and the next hole / shop */
    #cash-out {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(8, 28, 18, 0.85);
      backdrop-filter: blur(6px);
      z-index: 65;
      font-family: inherit;
      color: white;
      padding: 16px;
    }
    #cash-out.shown { display: flex; }
    #cash-out .cashout-card {
      width: 100%; max-width: 380px;
      background: linear-gradient(180deg, #2a4a36 0%, #1f3a2a 100%);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 18px 18px 16px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; gap: 10px;
    }
    #cash-out .cashout-title {
      font-size: 12px; letter-spacing: 1.5px; opacity: 0.7;
      text-align: center; text-transform: uppercase;
    }
    #cash-out .cashout-score {
      text-align: center;
      font-size: 38px; font-weight: 900; letter-spacing: 2px;
      line-height: 1;
      margin: 4px 0 8px;
      color: #ffd86b;
    }
    #cash-out .cashout-score.eagle, #cash-out .cashout-score.ace { color: #66e0a3; }
    #cash-out .cashout-score.par   { color: #ffffff; }
    #cash-out .cashout-score.bogey, #cash-out .cashout-score.doublebogey, #cash-out .cashout-score.over { color: #ff9b6b; }
    /* Strokes vs Par ball track */
    #cash-out .cashout-track {
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #cash-out .track-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px;
    }
    #cash-out .track-label {
      font-size: 11px; opacity: 0.7;
      letter-spacing: 1px; text-transform: uppercase;
      width: 56px;
    }
    #cash-out .balls {
      display: flex; align-items: center;
      gap: 5px;
      flex: 1; flex-wrap: wrap;
    }
    #cash-out .ball {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.35);
      box-sizing: border-box;
      transform: scale(0.4);
      opacity: 0;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }
    #cash-out .ball.appeared { transform: scale(1); opacity: 1; }
    #cash-out .strokes-balls .ball.appeared { background: #66e0a3; border-color: #66e0a3; box-shadow: 0 0 8px rgba(102,224,163,0.5); }
    #cash-out .strokes-balls .ball.appeared.over { background: #ff6b6b; border-color: #ff6b6b; box-shadow: 0 0 8px rgba(255,107,107,0.5); }
    #cash-out .par-row .ball { width: 11px; height: 11px; }
    #cash-out .track-count {
      font-weight: 800; font-size: 14px;
      min-width: 22px; text-align: right;
      opacity: 0.8;
    }
    #cash-out .par-row .track-count { opacity: 0.45; }

    #cash-out .cashout-lines {
      display: flex; flex-direction: column;
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      padding: 10px 12px;
    }
    #cash-out .cashout-line {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px dashed rgba(255,255,255,0.12);
      font-size: 14px;
    }
    #cash-out .cashout-line:last-child { border-bottom: none; }
    #cash-out .cashout-line .label { opacity: 0.85; }
    #cash-out .cashout-line .count { font-size: 11px; opacity: 0.6; margin-left: 6px; }
    #cash-out .cashout-line .cash { font-weight: 800; color: #c8f7c8; }
    #cash-out .cashout-total {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 8px 12px;
      font-size: 16px; font-weight: 900;
    }
    #cash-out .cashout-total .cash { color: #ffd86b; font-size: 20px; }
    #cash-out .cashout-cash {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      padding: 6px 0 10px;
      font-size: 16px; font-weight: 800;
    }
    #cash-out .cashout-cash .from { opacity: 0.55; }
    #cash-out .cashout-cash .arrow { opacity: 0.45; font-size: 18px; }
    #cash-out .cashout-cash .to    { color: #66e0a3; font-size: 22px; }
    #cash-out .cashout-btn {
      pointer-events: auto;
      padding: 14px 22px;
      font-size: 16px; font-weight: 900; letter-spacing: 1.5px;
      background: #ffd86b;
      color: #1f3a2a;
      border: none; border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      transition: transform 0.08s ease, opacity 0.15s ease;
    }
    #cash-out .cashout-btn:disabled { opacity: 0.45; cursor: default; }
    #cash-out .cashout-btn.ready:active { transform: scale(0.97); }

    /* Pause menu — small centered card mid-game */
    #pause-menu {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      z-index: 75;
      font-family: inherit;
    }
    #pause-menu.shown { display: flex; }
    #pause-menu .pause-card {
      background: #2c4f33;
      color: white;
      border-radius: 16px;
      padding: 24px 28px;
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; min-width: 240px;
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.4);
    }
    #pause-menu h2 {
      margin: 0 0 4px;
      font-size: 24px; letter-spacing: 2px; text-transform: uppercase;
    }
    #pause-menu button {
      min-width: 200px;
      padding: 12px 18px;
      font-size: 15px; font-weight: 800; letter-spacing: 1px;
      border: none; border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
    }
    #pause-menu button:active { transform: scale(0.97); }
    #pause-resume { background: white; color: #111; }
    #pause-quit   { background: rgba(255, 255, 255, 0.16); color: white; border: 1.5px solid rgba(255, 255, 255, 0.35); }

    /* Collection sits below Play/Resume — visually secondary */
    #title-collection {
      min-width: 220px;
      background: rgba(255, 255, 255, 0.16) !important;
      color: white !important;
      border: 1.5px solid rgba(255, 255, 255, 0.35) !important;
      box-shadow: none !important;
      font-size: 14px !important;
      letter-spacing: 1px !important;
    }
    #stat-cash { background: rgba(46, 125, 50, 0.55); }
    #stat-strokes.warning { background: rgba(255, 152, 0, 0.55); }
    #stat-strokes.last-chance { background: rgba(220, 50, 50, 0.85); animation: pulse 0.6s ease-in-out infinite alternate; }
    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.05); }
    }
    #shot-distance {
      position: fixed;
      top: env(safe-area-inset-top, 12px);
      left: 50%; transform: translateX(-50%);
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
      font-size: 15px; font-weight: 800; letter-spacing: 1px;
      background: rgba(0,0,0,0.45);
      padding: 6px 14px; border-radius: 999px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease;
      z-index: 3;
    }
    #score-banner {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      flex-direction: column; gap: 6px;
      opacity: 0; transition: opacity 0.2s ease;
    }
    #score-banner .banner-name {
      font-size: 44px; font-weight: 900; letter-spacing: 2px;
      color: white; text-shadow: 0 4px 18px rgba(0,0,0,0.6);
    }
    #score-banner .banner-cash {
      font-size: 22px; font-weight: 800;
      color: #c8f7c8; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    #run-over {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      z-index: 50;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      font-family: inherit;
    }
    #run-over.shown { display: flex; }
    #run-over h1 { font-size: 38px; margin: 0; letter-spacing: 2px; }
    #run-over .stats { display: flex; flex-direction: column; gap: 4px; align-items: center; font-size: 16px; opacity: 0.9; }
    #run-over .play-again {
      margin-top: 12px;
      padding: 14px 28px;
      font-size: 16px; font-weight: 800;
      background: white;
      color: #111;
      border: none; border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    /* Collection modal */
    #collection-modal {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      background: rgba(20, 40, 30, 0.88);
      backdrop-filter: blur(8px);
      z-index: 90;
      color: white;
      font-family: inherit;
      padding: env(safe-area-inset-top, 12px) 12px env(safe-area-inset-bottom, 12px) 12px;
      overflow: hidden;
    }
    #collection-modal.shown { display: flex; }
    #collection-modal header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 4px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }
    #collection-modal header h2 {
      margin: 0; font-size: 20px; letter-spacing: 1px; text-transform: uppercase;
    }
    #collection-close {
      background: rgba(255,255,255,0.14);
      border: none; color: white;
      width: 36px; height: 36px; border-radius: 50%;
      font-size: 22px; font-weight: 800;
      cursor: pointer; line-height: 1;
      font-family: inherit;
    }
    #collection-modal main {
      flex: 1; overflow-y: auto;
      padding: 12px 0;
    }
    #collection-modal h3 {
      margin: 4px 4px 10px;
      font-size: 14px; letter-spacing: 1px; opacity: 0.7; text-transform: uppercase;
    }
    #hole-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .hole-card {
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 8px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.1s ease;
    }
    .hole-card.locked { opacity: 0.55; cursor: default; }
    .hole-card:not(.locked):active { transform: scale(0.97); background: rgba(255,255,255,0.13); }
    .hole-card canvas { border-radius: 6px; }
    .hole-label { text-align: center; }
    .hole-name { font-size: 13px; font-weight: 800; letter-spacing: 0.5px; }
    .hole-meta { font-size: 11px; opacity: 0.75; margin-top: 2px; }

    /* Detail view — transparent overlay so the live 3D hole is visible behind it */
    #hole-detail {
      position: fixed; inset: 0;
      display: none;
      pointer-events: none;
      z-index: 100;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.55);
      font-family: inherit;
    }
    #hole-detail.shown { display: block; }
    #hole-detail .detail-close {
      position: absolute;
      top: env(safe-area-inset-top, 14px); left: 14px;
      pointer-events: auto;
      padding: 10px 16px;
      background: rgba(0,0,0,0.55);
      border: 1.5px solid rgba(255,255,255,0.35);
      color: white;
      border-radius: 999px;
      font-family: inherit;
      font-size: 13px; font-weight: 800; letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
    }
    #hole-detail .detail-close:active { transform: scale(0.96); }
    #hole-detail .detail-name {
      position: absolute;
      top: env(safe-area-inset-top, 14px);
      left: 50%; transform: translateX(-50%);
      font-size: 22px; font-weight: 900; letter-spacing: 2px;
      text-transform: uppercase;
    }
    #hole-detail .detail-meta {
      position: absolute;
      top: calc(env(safe-area-inset-top, 14px) + 30px);
      left: 50%; transform: translateX(-50%);
      font-size: 13px; opacity: 0.85; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    #hud-bottom {
      position: fixed; left: 0; right: 0;
      bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      padding: 0 14px;
      color: white; opacity: 0.8;
      font-size: 11px; text-align: center;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    #overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      font-size: 36px; font-weight: 900; letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 4px 16px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #club-selector {
      position: fixed;
      bottom: calc(40px + env(safe-area-inset-bottom, 0px));
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px;
      z-index: 5;
    }
    .club-btn {
      --club-color: #fff;
      min-width: 64px; padding: 9px 10px;
      background: rgba(0, 0, 0, 0.55);
      border: 2px solid var(--club-color);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      transition: transform 0.1s ease, background 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .club-btn .club-short { font-size: 16px; font-weight: 800; line-height: 1; }
    .club-btn .club-name  { font-size: 10px; opacity: 0.85; line-height: 1; }
    .club-btn.active {
      background: var(--club-color);
      color: #111;
      transform: translateY(-2px) scale(1.04);
    }
    .club-btn.active .club-name { opacity: 0.9; }
    .club-btn:active { transform: scale(0.97); }

    /* Power meter — left edge, vertical fill */
    #power-meter {
      position: fixed;
      left: 16px;
      top: 50%; transform: translateY(-50%);
      width: 16px; height: 180px;
      background: rgba(0, 0, 0, 0.45);
      border: 1.5px solid rgba(255, 255, 255, 0.55);
      border-radius: 10px;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      z-index: 4;
    }
    #power-meter-fill {
      position: absolute; left: 0; right: 0; bottom: 0;
      height: 0%;
      background: hsl(120, 85%, 50%);
      transition: height 0.04s linear, background 0.04s linear;
    }
    #power-meter-label {
      position: absolute;
      left: 24px; top: 50%; transform: translateY(-50%);
      color: white;
      font-size: 13px; font-weight: 800;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
    }

    /* Rotate camera buttons — left & right edges, vertically centered */
    .rotate-btn {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      width: 52px; height: 52px;
      background: rgba(0, 0, 0, 0.28);
      border: 1.5px solid rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      color: white;
      font-size: 28px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s ease, background 0.08s ease, opacity 0.15s ease;
      z-index: 4;
      padding: 0;
      font-family: inherit;
    }
    .rotate-btn:active {
      background: rgba(0, 0, 0, 0.55);
      transform: translateY(-50%) scale(0.92);
    }
    #rotate-left  { left: 14px; }
    #rotate-right { right: 14px; }
  </style>
</head>
<body>
  <div id="hud-top">
    <div id="title">Wacky Golf</div>
    <div id="hud-stats">
      <div id="stat-hole">HOLE 1 · PAR 4</div>
      <div id="stat-strokes">STROKE 0/8</div>
      <div id="stat-cash">$8</div>
      <button id="pause-btn" type="button" aria-label="Pause to title screen">☰</button>
    </div>
  </div>
  <div id="hud-bottom">Pick a club · drag back · release to swing · sink it</div>
  <div id="shot-distance">0 YD</div>
  <div id="score-banner">
    <div class="banner-name"></div>
    <div class="banner-cash"></div>
  </div>
  <div id="run-over">
    <h1>RUN OVER</h1>
    <div class="stats">
      <div id="run-over-holes">Holes played: 0</div>
      <div id="run-over-cash">Total cash: $0</div>
    </div>
    <button class="play-again" id="play-again-btn" type="button">Play Again</button>
  </div>
  <div id="cash-out" role="dialog" aria-modal="true" aria-label="Cash out">
    <div class="cashout-card">
      <div class="cashout-title">Hole 1 · Par 4</div>
      <div class="cashout-score">PAR</div>

      <div class="cashout-track">
        <div class="track-row">
          <span class="track-label">Strokes</span>
          <span class="balls strokes-balls"></span>
          <span class="track-count strokes-count">0</span>
        </div>
        <div class="track-row par-row">
          <span class="track-label">Par</span>
          <span class="balls par-balls"></span>
          <span class="track-count">—</span>
        </div>
      </div>

      <div class="cashout-lines">
        <div class="cashout-line line-score">
          <div class="label">Score</div>
          <div class="cash">+$0</div>
        </div>
        <div class="cashout-line line-streak">
          <div class="label">Streak bonus<span class="count"></span></div>
          <div class="cash">+$0</div>
        </div>
        <div class="cashout-line line-interest">
          <div class="label">Interest</div>
          <div class="cash">+$0</div>
        </div>
      </div>
      <div class="cashout-total">
        <div class="label">Total</div>
        <div class="cash">+$0</div>
      </div>
      <div class="cashout-cash">
        <div class="from">$0</div>
        <div class="arrow">→</div>
        <div class="to">$0</div>
      </div>
      <button class="cashout-btn" type="button">Cash Out</button>
    </div>
  </div>

  <div id="pause-menu" role="dialog" aria-modal="true" aria-label="Paused">
    <div class="pause-card">
      <h2>Paused</h2>
      <button id="pause-resume" type="button">Resume</button>
      <button id="pause-quit" type="button">Quit to Title</button>
    </div>
  </div>

  <div id="title-screen" role="dialog" aria-modal="true" aria-label="Title screen">
    <div class="top">
      <div class="logo">Wacky Golf</div>
      <div id="title-subtitle"></div>
    </div>
    <div class="center">
      <button id="title-play" type="button">Play</button>
      <button id="title-resume" type="button">Resume</button>
      <button id="title-collection" type="button">📋 Collection</button>
    </div>
  </div>

  <div id="collection-modal" role="dialog" aria-modal="true" aria-label="Hole Collection">
    <header>
      <h2>Collection</h2>
      <button id="collection-close" type="button" aria-label="Close">×</button>
    </header>
    <main>
      <h3>Holes</h3>
      <div id="hole-grid"></div>
    </main>
  </div>

  <div id="hole-detail" role="dialog" aria-modal="true">
    <button class="detail-close" type="button">← Back</button>
    <div class="detail-name"></div>
    <div class="detail-meta"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
