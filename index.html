<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#4CAF50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <title>Wacky Golf</title>
  <style>
    :root { color-scheme: light; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100dvh;
      overflow: hidden;
      background: #87CEEB;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
      overscroll-behavior: none;
    }
    canvas { display: block; touch-action: none; }
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      padding: env(safe-area-inset-top, 12px) 14px 14px 14px;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    #title {
      font-size: 18px; font-weight: 800; letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    #subtitle {
      font-size: 12px; opacity: 0.85; margin-top: 4px;
    }
    #footer {
      position: fixed; left: 0; right: 0; bottom: 0;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
      color: white; opacity: 0.7;
      font-size: 11px; text-align: center;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="title">Wacky Golf</div>
    <div id="subtitle">Phase 0 · scaffold smoke test</div>
  </div>
  <div id="footer">If you see a ball, a flag, and trees rotating — Phase 0 works on this browser.</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
